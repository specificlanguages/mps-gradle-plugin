name: Build

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Report the result for every platform rather than stopping at the first failure.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: 17
      - name: Build
        run: ./gradlew build
      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.os }}
          path: |
            subprojects/*/build/reports/tests/
            subprojects/*/build/test-results/
          # A failing build is expected to produce reports; say so loudly if it did not.
          if-no-files-found: warn
