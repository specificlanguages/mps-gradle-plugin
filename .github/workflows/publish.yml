name: Publish

# Publishes a single module to the Gradle Plugin Portal when its release tag (`<module>-<version>`, as created
# by the module's `prepareRelease` task) is pushed.
on:
  push:
    tags: ['*-[0-9]*.[0-9]*.[0-9]*']

jobs:
  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # The version-policy check compares against earlier release tags, so it needs full history.
          fetch-depth: 0
      - name: Fetch tags
        run: git fetch --tags --force
      - name: Parse module and version from tag
        id: tag
        run: |
          TAG='${{ github.ref_name }}'
          if [[ ! $TAG =~ ^(.+)-([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "::error::Tag '$TAG' does not match <module>-<major>.<minor>.<patch>" >&2
            exit 1
          fi
          MODULE="${BASH_REMATCH[1]}"
          VERSION="${BASH_REMATCH[2]}"
          if [[ ! -d "subprojects/$MODULE" ]]; then
            echo "::error::Tag '$TAG' does not correspond to a module under subprojects/" >&2
            exit 1
          fi
          DECLARED=$(sed -n 's/^version=//p' "subprojects/$MODULE/gradle.properties")
          if [[ "$DECLARED" != "$VERSION" ]]; then
            echo "::error::Tag version is $VERSION but subprojects/$MODULE/gradle.properties declares '$DECLARED'" >&2
            exit 1
          fi
          echo "module=$MODULE" >> "$GITHUB_OUTPUT"
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: 17
      - name: Build and check
        run: ./gradlew :${{ steps.tag.outputs.module }}:build checkReleaseVersions
      - name: Publish
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew :${{ steps.tag.outputs.module }}:publishPlugins
